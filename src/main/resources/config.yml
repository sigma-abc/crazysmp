# ── CURRENCIES ───────────────────────────────────────────────────
# The first currency marked vault: true is registered with VaultUnlocked
# and works with EconomyShopGUI, shop plugins, etc.
currencies:
  dollars:
    display-name: "Dollars"
    symbol: "$"
    symbol-position: before   # before or after
    decimal-places: 2
    starting-balance: 500.0
    vault: true               # THIS one hooks into Vault
    color: "&a"               # colour for display
  shards:
    display-name: "Shards"
    symbol: "✦"
    symbol-position: after
    decimal-places: 0
    starting-balance: 0.0
    vault: false
    color: "&b"
  # Add more currencies here:
  # gems:
  #   display-name: "Gems"
  #   symbol: "♦"
  #   symbol-position: after
  #   decimal-places: 0
  #   starting-balance: 0.0
  #   vault: false
  #   color: "&d"

# ── HOMES ────────────────────────────────────────────────────────
homes:
  # Default max homes (overridden by crazysmp.homes.<n> permission)
  default-max: 1
  # Teleport delay in seconds (0 = instant)
  teleport-delay: 3
  # Cancel teleport on move?
  cancel-on-move: true
  # GUI title
  gui-title: "&8⌂ &6Your Homes"
  # Filler item in empty slots
  filler-material: GRAY_STAINED_GLASS_PANE

# ── RTP ──────────────────────────────────────────────────────────
rtp:
  # World to RTP in (leave blank for player's current world)
  world: "world"
  # Search radius (random within this)
  min-radius: 1000
  max-radius: 50000
  # Excluded biomes (unsafe)
  excluded-biomes:
    - OCEAN
    - DEEP_OCEAN
    - FROZEN_OCEAN
    - DEEP_FROZEN_OCEAN
    - COLD_OCEAN
    - DEEP_COLD_OCEAN
    - LUKEWARM_OCEAN
    - DEEP_LUKEWARM_OCEAN
    - WARM_OCEAN
    - LAVA
  # Max attempts to find safe location
  max-attempts: 50
  # Cooldown in seconds (0 = none)
  cooldown: 300
  # GUI title
  gui-title: "&8✈ &6Random Teleport"
  # GUI options shown as items
  options:
    overworld:
      material: GRASS_BLOCK
      name: "&aOverworld RTP"
      lore:
        - "&7Teleport to a random location"
        - "&7in the overworld."
        - ""
        - "&eClick to teleport!"
      world: "world"
      enabled: true
    nether:
      material: NETHERRACK
      name: "&cNether RTP"
      lore:
        - "&7Teleport to a random location"
        - "&7in the nether."
        - ""
        - "&eClick to teleport!"
      world: "world_nether"
      enabled: true
    end:
      material: END_STONE
      name: "&5End RTP"
      lore:
        - "&7Teleport to a random location"
        - "&7in the end."
        - ""
        - "&eClick to teleport!"
      world: "world_the_end"
      enabled: false

