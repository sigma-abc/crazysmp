  no-permission: "&cYou don't have permission to do that."
  player-not-found: "&cPlayer &e%player%&c not found."
  # Economy
  balance-self: "&7Your &6%currency%&7 balance: &a%symbol%%amount%"
  balance-other: "&6%player%&7's &6%currency%&7 balance: &a%symbol%%amount%"
  pay-sent: "&aSent &e%symbol%%amount% &6%currency%&a to &e%player%&a."
  pay-received: "&aYou received &e%symbol%%amount% &6%currency%&a from &e%player%&a."
  pay-not-enough: "&cYou don't have enough &6%currency%&c."
  pay-self: "&cYou can't pay yourself."
  eco-give: "&aGave &e%symbol%%amount% &6%currency%&a to &e%player%&a."
  eco-take: "&aTook &e%symbol%%amount% &6%currency%&a from &e%player%&a."
  eco-set: "&aSet &e%player%&a's &6%currency%&a balance to &e%symbol%%amount%&a."
  eco-reset: "&aReset &e%player%&a's &6%currency%&a balance."
  # Homes
  home-set: "&aHome &6%name%&a set!"
  home-deleted: "&aHome &6%name%&a deleted."
  home-not-found: "&cHome &e%name%&c not found."
  home-teleporting: "&7Teleporting to &6%name%&7 in &e%seconds%s&7..."
  home-teleported: "&aTeleported to &6%name%&a."
  home-cancelled: "&cTeleport cancelled."
  home-limit: "&cYou've reached your home limit &8(&e%max% homes&8)&c."
  # RTP
  rtp-searching: "&7Finding a safe location..."
  rtp-teleported: "&aTeleported to &e%x%&7, &e%y%&7, &e%z%&7 in &6%world%&7."
  rtp-failed: "&cCouldn't find a safe location. Try again!"
  rtp-cooldown: "&cRTP on cooldown. &e%seconds%s&c remaining."
  # Migration
  migrate-start: "&7Starting migration from &e%source%&7..."
  migrate-done: "&aMigration complete! &e%count%&a records migrated."
  migrate-error: "&cMigration failed: &e%error%"