# ── Baltop Blacklist ─────────────────────────────────────
# UUIDs OR player names to exclude from /baltop
baltop:
  blacklist:
    - "ServerShop"          # player name
    - "00000000-0000-0000-0000-000000000000"  # UUID example

# ── Shard Shop Hook ──────────────────────────────────────
shard-shop:
  # The currency ID from your 'currencies' section to use as shards
  currency: shards

  # EconomyShopGUI: items listed here cost shards (material -> cost per item)
  economyshopgui:
    enabled: true
    items:
      DIAMOND: 5
      EMERALD: 3
      NETHERITE_INGOT: 50
      NETHER_STAR: 200
      SPAWNER: 100
      WITHER_SKELETON_SKULL: 30

  # SmartSpawners: each upgrade level costs this many shards
  smart-spawners:
    enabled: true
    upgrade-cost: 25

